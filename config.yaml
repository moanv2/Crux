# config.yaml — shared project configuration (paths + thresholds).
#
# Read by EVERY role. No hardcoded paths in code: everything resolves from here,
# relative to the repo root, so the same code runs unchanged in Colab and locally.
# Seeded by Diego (Data); the pipeline section is owned by Coder 2.

# ── Shared conventions (do not change without team agreement) ────────────────
image_size: 640            # train / eval / inference — LOCKED, never change.

# LOCKED class list (Diego). Same names AND order everywhere (indices 0–5).
# Manually annotated by hold type; boxes seeded from the forked GDSCMoonless set
# and re-typed, plus the team's own wall photos. See data/annotation_guide.md.
classes:
  - jug      # 0  big positive incut — easy
  - pocket   # 1  hole taking 1–3 fingers
  - pinch    # 2  squeezed between thumb and fingers
  - sloper   # 3  rounded, friction-dependent — hard
  - crimp    # 4  small thin edge, fingertips only — hard
  - volume   # 5  large geometric wall feature

# ── Paths (relative to repo root; resolved to absolute by scripts/config.py) ──
paths:
  raw_dir: data/raw              # Roboflow download lands here
  custom_dir: data/custom        # team phone photos + their Roboflow-exported labels
  interim_dir: data/interim      # cleaned + merged, flat images/ + labels/, pre-split
  processed_dir: data/processed  # final train/val/test YOLO dataset
  data_yaml: data/data.yaml      # generated by export.py — the handoff to Coder 1
  data_card: data/data_card.md   # generated by stats.py
  weights: models/best.pt        # the one frozen detector (Coder 1 writes this)

# ── Roboflow (Diego) ─────────────────────────────────────────────────────────
roboflow:
  # API key comes from the ROBOFLOW_API_KEY env var — never commit it.
  # workspace/project point at YOUR forked + re-typed project (not the original).
  workspace: TODO-workspace
  project: TODO-project
  version: 1                     # record the exact version ID in data_card.md
  # The export format is just the on-disk label layout (class cx cy w h + a
  # data.yaml) — independent of the model. YOLO26 trains on the standard YOLO txt
  # export, so any modern YOLO format works; pick whatever the dataset offers.
  format: yolov11

# ── Cleaning (Diego) ─────────────────────────────────────────────────────────
clean:
  resize_to: 640
  fix_exif: true
  dedupe: true
  dedupe_hash_size: 16           # perceptual-hash size for near-duplicate detection
  drop_corrupt: true
  drop_empty_labels: false       # keep background/negative images? decide before locking

# ── Custom photo ingest (Diego) ──────────────────────────────────────────────
ingest:
  incoming_dir: data/custom/incoming   # where teammates drop annotated phone photos

# ── Split (Diego) ────────────────────────────────────────────────────────────
split:
  train: 0.70
  val: 0.20
  test: 0.10
  seed: 42
  stratify: true                 # stratify by dominant class where feasible

# ── Augmentation (Diego sets the recipe; Coder 1 applies it in training) ─────
augmentation:
  fliplr: 0.5
  flipud: 0.0
  brightness: 0.2
  rotation_deg: 10

# ── Label QA / sanity check (Diego) ──────────────────────────────────────────
sanity:
  max_box_area_frac: 0.9         # flag boxes covering >90% of the image
  min_box_side_frac: 0.005       # flag boxes thinner than 0.5% of the image side

# ── Pipeline thresholds (owned by Coder 2 — placeholder, not used by Data) ───
pipeline:
  association_margin_px: 15      # expand hold box by this margin for contact test
  min_contact_frames: 3          # consecutive frames a keypoint must sit in a box
