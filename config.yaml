# config.yaml — shared project configuration (paths + thresholds).
#
# Read by EVERY role. No hardcoded paths in code: everything resolves from here,
# relative to the repo root, so the same code runs unchanged in Colab and locally.
# Seeded by Diego (Data); the pipeline section is owned by Coder 2.

# ── Shared conventions (do not change without team agreement) ────────────────
image_size: 640            # train / eval / inference — LOCKED, never change.

# LOCKED: single class for the climbing-coach detector. The graded core detects
# WHERE holds are; hold types/colours are future stretches (see README "Scope").
classes:
  - hold     # 0

# ── Paths (relative to repo root; resolved to absolute by scripts/config.py) ──
paths:
  raw_dir: data/raw              # Roboflow download lands here
  custom_dir: data/custom        # optional team phone photos
  interim_dir: data/interim      # cleaned + flattened, flat images/ + labels/, pre-split
  processed_dir: data/processed  # final train/val/test YOLO dataset
  data_yaml: data/data.yaml      # generated by export.py — the handoff to Coder 1
  data_card: data/data_card.md   # generated by stats.py
  weights: models/best.pt        # the one frozen detector (Coder 1 writes this)

# ── Roboflow (Diego) ─────────────────────────────────────────────────────────
roboflow:
  # API key comes from the ROBOFLOW_API_KEY env var — never commit it.
  # Fork of "Climbing Replica Test" (already single-class `hold`), trimmed to ~425
  # images with Resize 640 + Auto-Orient.
  workspace: diego-alfaro-s-workspace
  project: climbing-replica-test-bdtpi
  version: 3                     # 425 imgs, 640x640, single-class hold
  format: yolov11                # on-disk YOLO label layout (model-independent)

# ── Cleaning (Diego) ─────────────────────────────────────────────────────────
clean:
  remap_to_single_class: true    # collapse every box to class 0 "hold" (idempotent)
  resize_to: 640                 # YOLO coords are normalized → a stretch-resize needs no box edit
  fix_exif: true
  dedupe: true
  dedupe_hash_size: 16           # perceptual-hash size for near-duplicate detection
  dedupe_max_distance: 5         # Hamming distance (<=) at which two images count as near-duplicates
  drop_corrupt: true
  drop_empty_labels: false       # keep background/negative images?

# ── Custom photo ingest (Diego) — optional; a single Roboflow project is simpler ─
ingest:
  incoming_dir: data/custom/incoming

# ── Split (Diego) ────────────────────────────────────────────────────────────
split:
  train: 0.70
  val: 0.20
  test: 0.10
  seed: 42
  stratify: false                # single class — nothing to stratify

# ── Augmentation (Diego sets the recipe; Coder 1 applies it in training) ─────
augmentation:
  fliplr: 0.5
  flipud: 0.0
  brightness: 0.2
  rotation_deg: 10

# ── Label QA / sanity check (Diego) ──────────────────────────────────────────
sanity:
  max_box_area_frac: 0.9         # flag boxes covering >90% of the image
  min_box_side_frac: 0.005       # flag boxes thinner than 0.5% of the image side

# ── Training (Coder 1 — Model) ───────────────────────────────────────────────
training:
  model: yolo26n.pt              # COCO-pretrained checkpoint to fine-tune (n or s)
  epochs: 80
  batch: 16
  lr0: 0.01
  patience: 20                   # early-stop patience
  seed: 42

# ── Pipeline thresholds (owned by Coder 2 — climbing-coach analysis) ─────────
pipeline:
  association_margin_px: 15      # expand hold box by this margin for the contact test
  min_contact_frames: 3          # consecutive frames a keypoint must sit in a box
